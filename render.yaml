# render.yaml — Bella Vita Render deployment blueprint
# This file lets you deploy both backend and frontend to Render in one click.
# In Render: Create New > Blueprint > Connect this repo. Render will read this file.

services:
  # Backend API + serves frontend build
  - type: web
    name: bella-vita-api
    runtime: node
    plan: starter        # $7/month — change to "free" for testing (sleeps after 15 min idle)
    region: frankfurt    # closest to Algeria
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: bella-vita-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 4000
      - key: DB_PATH
        value: /var/data/bellavita.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false           # Render will prompt you to set this in the dashboard
      - key: CORS_ORIGIN
        value: "*"
